<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인공지능 가위바위보 대결</title>
    <style>
        /* GUI 디자인 (CSS) */
        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            background-color: #f0f2f5;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #1a73e8;
            margin-bottom: 5px;
        }
        .scoreboard {
            background: white;
            max-width: 400px;
            margin: 0 auto 20px;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-around;
            font-weight: bold;
        }
        .record-box {
            color: #d93025;
        }
        #webcam-container {
            margin: 20px auto;
            width: 300px;
            height: 300px;
            background-color: #e0e0e0;
            border-radius: 12px;
            overflow: hidden;
            border: 4px solid #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
        }
        /* 웹캠 위에 띄울 카운트다운 숫자 스타일 */
        #countdown-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            font-weight: bold;
            color: #ffcc00;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
            display: none;
            z-index: 10;
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }
        .controls {
            margin: 20px 0;
        }
        button {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin: 0 5px;
        }
        button:hover {
            background-color: #1557b0;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        #play-btn {
            background-color: #34a853;
            font-size: 22px;
            font-weight: bold;
            padding: 15px 30px;
        }
        #play-btn:hover {
            background-color: #2b803e;
        }
        .result-area {
            background: white;
            max-width: 500px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .vs-text {
            font-size: 24px;
            margin: 15px 0;
        }
        #final-result {
            font-size: 32px;
            font-weight: bold;
            color: #1a73e8;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>🤖 AI 가위바위보 대결 v2/h1>
    <p>웹캠을 켜고 '가위바위보 내기!' 버튼을 누른 뒤, 카운트다운에 맞춰 동작을 취하세요.</p>

    <!-- 점수 및 기록판 -->
    <div class="scoreboard">
        <div>현재 연속 승리: <span id="current-streak">0</span>연승</div>
        <div class="record-box">👑 최고 기록: <span id="best-record">없음 (0연승)</span></div>
    </div>

    <!-- 버튼 영역 -->
    <div class="controls">
        <button type="button" onclick="init()" id="start-btn">1. 웹캠 켜기</button>
    </div>

    <!-- 웹캠 화면 -->
    <div id="webcam-container">
        <div id="countdown-overlay">3</div>
    </div>

    <div class="controls">
        <button type="button" onclick="startCountdown()" id="play-btn" disabled>2. 가위바위보 내기!</button>
    </div>

    <!-- 결과 화면 -->
    <div class="result-area">
        <div class="vs-text">
            나: <span id="user-move">?</span> 
            <span style="color:#999; font-size:16px; margin: 0 10px;">VS</span> 
            컴퓨터: <span id="computer-move">?</span>
        </div>
        <div id="final-result">-</div>
    </div>

    <!-- 텐서플로우 스크립트 -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script>
        // 알려주신 티처블 머신 모델 URL 적용
        const URL = "https://teachablemachine.withgoogle.com/models/mXn8LcmcQ/";

        let model, webcam, labelContainer, maxPredictions;
        let currentUserPose = ""; 
        let currentStreak = 0;    
        let isPlaying = false; // 게임 진행 중(카운트다운 중) 버튼 중복 클릭 방지용
        
        // 최고 기록 불러오기
        let maxStreak = localStorage.getItem("rspMaxStreak") || 0;
        let maxStreakName = localStorage.getItem("rspMaxName") || "없음";

        updateRecordUI();

        // 1. 모델 및 웹캠 초기화
        async function init() {
            document.getElementById("start-btn").disabled = true;
            document.getElementById("start-btn").innerText = "로딩 중...";

            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            const flip = true; 
            webcam = new tmImage.Webcam(300, 300, flip);
            await webcam.setup();
            await webcam.play();
            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").appendChild(webcam.canvas);
            
            document.getElementById("start-btn").style.display = "none";
            document.getElementById("play-btn").disabled = false; 
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        // 2. 실시간 동작 예측
        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            let highestProb = 0;
            
            for (let i = 0; i < maxPredictions; i++) {
                if (prediction[i].probability > highestProb) {
                    highestProb = prediction[i].probability;
                    currentUserPose = prediction[i].className; 
                }
            }
        }

        // 3. 카운트다운 시작 함수
        function startCountdown() {
            if (isPlaying) return;
            isPlaying = true;

            const playBtn = document.getElementById("play-btn");
            const countdownOverlay = document.getElementById("countdown-overlay");
            const resultTextEl = document.getElementById("final-result");
            
            playBtn.disabled = true;
            document.getElementById("user-move").innerText = "?";
            document.getElementById("computer-move").innerText = "?";
            resultTextEl.innerText = "준비...";
            resultTextEl.style.color = "#333";

            let count = 3;
            countdownOverlay.innerText = count;
            countdownOverlay.style.display = "block"; // 카운트다운 화면에 표시

            // 1초마다 숫자 줄이기
            const interval = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownOverlay.innerText = count;
                } else {
                    clearInterval(interval);
                    countdownOverlay.style.display = "none"; // 카운트다운 숨기기
                    evaluateGame(); // 카운트가 끝난 시점의 동작으로 승패 판별!
                }
            }, 1000);
        }

        // 4. 승패 판별 및 게임 결과 처리
        function evaluateGame() {
            const resultTextEl = document.getElementById("final-result");
            const playBtn = document.getElementById("play-btn");

            // 예외 처리: 동작을 인식하지 못했거나, '아무것도 내지 않음'일 경우
            if (!currentUserPose || currentUserPose === "아무것도 내지 않음") {
                resultTextEl.innerText = "⚠️ 손을 카메라 중앙에 명확히 보여주세요!";
                resultTextEl.style.color = "#fbbc05";
                
                document.getElementById("user-move").innerText = "안 냄";
                
                // 다시 시도할 수 있도록 버튼 활성화
                playBtn.disabled = false;
                isPlaying = false;
                return;
            }

            // 컴퓨터의 선택 (컴퓨터는 '아무것도 내지 않음'을 내지 않음)
            const choices = ["가위", "바위", "보"];
            const computerPose = choices[Math.floor(Math.random() * 3)];

            // 화면에 낸 것 표시
            document.getElementById("user-move").innerText = currentUserPose;
            document.getElementById("computer-move").innerText = computerPose;

            // 승패 계산
            const result = getResult(currentUserPose, computerPose);

            if (result === "승리") {
                currentStreak++;
                resultTextEl.innerText = "🎉 승리했습니다!";
                resultTextEl.style.color = "#34a853";
            } else if (result === "패배") {
                resultTextEl.innerText = "😢 패배했습니다...";
                resultTextEl.style.color = "#ea4335";
                
                checkHighScore();
                currentStreak = 0; // 패배 시 연승 초기화
            } else {
                resultTextEl.innerText = "🤝 무승부!";
                resultTextEl.style.color = "#fbbc05";
                // 무승부는 연승이 유지됨
            }

            document.getElementById("current-streak").innerText = currentStreak;
            
            // 게임이 끝나면 버튼 다시 활성화
            playBtn.disabled = false;
            isPlaying = false;
        }

        // 5. 가위바위보 상성 로직
        function getResult(user, comp) {
            if (user === comp) return "무승부";

            if (
                (user === "가위" && comp === "보") ||
                (user === "바위" && comp === "가위") ||
                (user === "보" && comp === "바위")
            ) {
                return "승리";
            }
            return "패배";
        }

        // 6. 최고 기록 로직
        function checkHighScore() {
            if (currentStreak > 0 && currentStreak > maxStreak) {
                setTimeout(() => {
                    const playerName = prompt(`🎉 새로운 최고 기록(${currentStreak}연승)입니다!\n이름을 입력해주세요:`, "익명");
                    if (playerName) {
                        maxStreak = currentStreak;
                        maxStreakName = playerName;
                        
                        localStorage.setItem("rspMaxStreak", maxStreak);
                        localStorage.setItem("rspMaxName", maxStreakName);
                        
                        updateRecordUI();
                    }
                }, 100);
            }
        }

        function updateRecordUI() {
            document.getElementById("best-record").innerText = `${maxStreakName} (${maxStreak}연승)`;
        }
    </script>
</body>
</html>
