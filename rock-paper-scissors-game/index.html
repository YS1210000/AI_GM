<!doctype html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AI Playground (판별기 & 가위바위보)</title><style>body{font-family:Pretendard,'Malgun Gothic',sans-serif;background-color:#f0f2f5;color:#333;text-align:center;margin:0;padding:0}.nav-tabs{display:flex;justify-content:center;background-color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.05);padding:10px 0;margin-bottom:30px}.tab-button{background:0 0;border:none;font-size:16px;font-weight:700;color:#666;padding:12px 24px;margin:0 10px;cursor:pointer;border-radius:8px;transition:all .2s ease}.tab-button:hover{background-color:#f0f2f5;color:#1a73e8}.tab-button.active{background-color:#1a73e8;color:#fff}.tab-content{display:none;padding:0 20px 40px 20px}.tab-content.active{display:block}h1{color:#1a73e8;margin-bottom:10px}p{color:#666;margin-bottom:30px}.upload-area{background:#fff;max-width:400px;margin:0 auto;padding:30px;border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.1)}#image-preview{max-width:100%;height:auto;border-radius:12px;margin-top:20px;display:none;box-shadow:0 2px 8px rgba(0,0,0,.1)}.file-upload-btn{display:inline-block;background-color:#1a73e8;color:#fff;padding:12px 24px;font-size:18px;font-weight:700;border-radius:8px;cursor:pointer;transition:background-color .2s}.file-upload-btn:hover{background-color:#1557b0}input[type=file]{display:none}.result-box{margin-top:20px;padding:20px;background-color:#f8f9fa;border-radius:12px;border:2px dashed #ccc}#result-text{font-size:28px;font-weight:700;color:#34a853}#loading-msg{color:#ea4335;font-weight:700;margin-bottom:20px}.scoreboard{background:#fff;max-width:400px;margin:0 auto 20px;padding:15px;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,.1);display:flex;justify-content:space-around;font-weight:700}.record-box{color:#d93025}#webcam-container{margin:20px auto;width:300px;height:300px;background-color:#e0e0e0;border-radius:12px;overflow:hidden;border:4px solid #fff;box-shadow:0 4px 6px rgba(0,0,0,.1);position:relative}#countdown-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:80px;font-weight:700;color:#fc0;text-shadow:2px 2px 8px rgba(0,0,0,.7);display:none;z-index:10}canvas{width:100%!important;height:100%!important;object-fit:cover}.controls{margin:20px 0}.game-btn{background-color:#1a73e8;color:#fff;border:none;padding:12px 24px;font-size:18px;border-radius:8px;cursor:pointer;transition:background-color .2s,transform .1s;margin:0 5px}.game-btn:hover{background-color:#1557b0}.game-btn:disabled{background-color:#ccc;cursor:not-allowed}#play-btn{background-color:#34a853;font-size:22px;font-weight:700;padding:15px 30px}#play-btn:hover{background-color:#2b803e}.manual-selection{background:#fff;max-width:500px;margin:20px auto;padding:20px;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,.1)}.manual-title{font-size:16px;color:#5f6368;margin-bottom:12px;font-weight:700}.manual-btn-group{display:flex;justify-content:center;gap:12px;margin-bottom:20px}.select-btn{background-color:#f1f3f4;color:#3c4043;border:2px solid #dadce0;padding:10px 20px;font-size:18px;font-weight:700;border-radius:8px;cursor:pointer;transition:all .2s ease;display:inline-block}.select-btn:hover{background-color:#e8eaed;border-color:#bdc1c6}.select-btn:active{transform:scale(.95)}#game-image-preview{max-width:100%;height:auto;border-radius:12px;margin:15px auto 0;display:none;box-shadow:0 2px 8px rgba(0,0,0,.1)}.result-area{background:#fff;max-width:500px;margin:20px auto;padding:20px;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,.1)}.vs-text{font-size:24px;margin:15px 0}#final-result{font-size:32px;font-weight:700;color:#1a73e8;margin-top:10px}</style><script defer="defer" src="/AI_GM/rock-paper-scissors-game/static/js/main.e85148ce.js"></script><link href="/AI_GM/rock-paper-scissors-game/static/css/main.f855e6bc.css" rel="stylesheet"></head><body><nav class="nav-tabs"><button class="tab-button active" onclick='switchTab("classifier-tab",this)'>🐶🐱 판별기</button> <button class="tab-button" onclick='switchTab("game-tab",this)'>✊✌️✋ 가위바위보</button></nav><div id="classifier-tab" class="tab-content active"><h1>🐾 강아지 vs 고양이 판별기 v2</h1><p>사진을 업로드하면 인공지능이 강아지인지 고양이인지 분석해 드립니다.</p><div id="loading-msg">인공지능 모델을 불러오는 중입니다. 잠시만 기다려주세요... ⏳</div><div class="upload-area"><label for="image-upload" class="file-upload-btn" id="upload-label" style="display:none">📸 사진 업로드하기</label> <input type="file" id="image-upload" accept="image/*" onchange="handleImageUpload(event)"> <img id="image-preview" alt="업로드된 이미지 미리보기"><div class="result-box"><div style="font-size:16px;color:#666;margin-bottom:5px">분석 결과</div><div id="result-text">사진을 올려주세요!</div></div></div></div><div id="game-tab" class="tab-content"><h1>🤖 AI 가위바위보 대결 v4</h1><p>웹캠, 사진 업로드, 버튼 클릭 중 원하는 방식으로 AI와 대결해 보세요!</p><div class="scoreboard"><div>현재 연속 승리: <span id="current-streak">0</span>연승</div><div class="record-box">👑 최고 기록: <span id="best-record">없음 (0연승)</span></div></div><div class="controls"><button type="button" class="game-btn" onclick="initWebcamGame()" id="start-btn">1. 웹캠 켜기</button></div><div id="webcam-container"><div id="countdown-overlay">3</div></div><div class="controls"><button type="button" class="game-btn" onclick="startCountdown()" id="play-btn" disabled="disabled">2. 가위바위보 내기! (카메라)</button></div><div class="manual-selection"><div class="manual-title">👇 버튼으로 직접 고르거나 사진을 올려보세요</div><div class="manual-btn-group"><button type="button" class="select-btn" onclick='playManualGame("가위")' id="btn-scissors">✌️ 가위</button> <button type="button" class="select-btn" onclick='playManualGame("바위")' id="btn-rock">✊ 바위</button> <button type="button" class="select-btn" onclick='playManualGame("보")' id="btn-paper">✋ 보</button></div><hr style="border:0;height:1px;background:#eee;margin:20px 0"><div><label for="game-image-upload" class="select-btn" style="background-color:#34a853;color:#fff;border:none" id="btn-upload">📸 손 사진 업로드하여 대결!</label> <input type="file" id="game-image-upload" accept="image/*" onchange="handleGameImageUpload(event)"></div><img id="game-image-preview" alt="업로드된 손 사진"></div><div class="result-area"><div class="vs-text">나: <span id="user-move">?</span> <span style="color:#999;font-size:16px;margin:0 10px">VS</span> 컴퓨터: <span id="computer-move">?</span></div><div id="final-result">-</div></div></div><script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script><script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script><script>function switchTab(e,t){document.querySelectorAll(".tab-content").forEach(e=>e.classList.remove("active"));document.querySelectorAll(".tab-button").forEach(e=>e.classList.remove("active")),document.getElementById(e).classList.add("active"),t.classList.add("active")}const CLASSIFIER_URL="/";let classifierModel,maxClassifierPredictions;function handleImageUpload(e){const t=e.target.files[0];if(!t)return;const n=new FileReader;n.onload=function(e){const t=document.getElementById("image-preview");t.src=e.target.result,t.style.display="block",document.getElementById("result-text").innerText="분석 중... 🔍",document.getElementById("result-text").style.color="#ea4335",t.onload=function(){predictAnimal(t)}},n.readAsDataURL(t)}async function predictAnimal(e){const t=await classifierModel.predict(e,!1);let n=0,a="";for(let e=0;e<maxClassifierPredictions;e++)t[e].probability>n&&(n=t[e].probability,a=t[e].className);const o=Math.round(100*n),l=document.getElementById("result-text");l.innerText=`${a} (${o}%)`,l.style.color="#1a73e8"}window.addEventListener("load",async()=>{classifierModel=await tmImage.load("/model.json","/metadata.json"),maxClassifierPredictions=classifierModel.getTotalClasses(),document.getElementById("loading-msg").style.display="none",document.getElementById("upload-label").style.display="inline-block"});const GAME_URL="https://teachablemachine.withgoogle.com/models/mXn8LcmcQ/";let gameModel,webcam,maxGamePredictions,currentUserPose="",currentStreak=0,isPlaying=!1,maxStreak=parseInt(localStorage.getItem("rspMaxStreak"),10)||0,maxStreakName=localStorage.getItem("rspMaxName")||"없음";async function loadGameModel(){if(gameModel)return;const e=GAME_URL+"model.json",t=GAME_URL+"metadata.json";gameModel=await tmImage.load(e,t),maxGamePredictions=gameModel.getTotalClasses()}async function initWebcamGame(){document.getElementById("start-btn").disabled=!0,document.getElementById("start-btn").innerText="웹캠 로딩 중...",await loadGameModel();webcam=new tmImage.Webcam(300,300,!0),await webcam.setup(),await webcam.play(),window.requestAnimationFrame(loopGame),document.getElementById("webcam-container").appendChild(webcam.canvas),document.getElementById("start-btn").style.display="none",document.getElementById("play-btn").disabled=!1}async function loopGame(){webcam.update(),await predictGame(),window.requestAnimationFrame(loopGame)}async function predictGame(){if(!gameModel)return;const e=await gameModel.predict(webcam.canvas);let t=0;for(let n=0;n<maxGamePredictions;n++)e[n].probability>t&&(t=e[n].probability,currentUserPose=e[n].className)}function startCountdown(){if(isPlaying)return;isPlaying=!0,toggleButtons(!0);const e=document.getElementById("countdown-overlay"),t=document.getElementById("final-result");document.getElementById("user-move").innerText="?",document.getElementById("computer-move").innerText="?",t.innerText="준비...",t.style.color="#333";let n=3;e.innerText=n,e.style.display="block";const a=setInterval(()=>{n--,n>0?e.innerText=n:(clearInterval(a),e.style.display="none",evaluateGame(currentUserPose))},1e3)}function playManualGame(e){if(isPlaying)return;isPlaying=!0,toggleButtons(!0);const t=document.getElementById("final-result");document.getElementById("user-move").innerText="?",document.getElementById("computer-move").innerText="?",t.innerText="대결 중... ⚡",t.style.color="#333",setTimeout(()=>{evaluateGame(e)},300)}async function handleGameImageUpload(e){const t=e.target.files[0];if(!t)return;if(isPlaying)return;isPlaying=!0,toggleButtons(!0);const n=document.getElementById("final-result");document.getElementById("user-move").innerText="?",document.getElementById("computer-move").innerText="?",n.innerText="AI 모델 준비 중... ⏳",n.style.color="#333",await loadGameModel();const a=new FileReader;a.onload=function(e){const t=document.getElementById("game-image-preview");t.src=e.target.result,t.style.display="block",n.innerText="사진 분석 중... 🔍",t.onload=async function(){const e=await gameModel.predict(t,!1);let n=0,a="";for(let t=0;t<maxGamePredictions;t++)e[t].probability>n&&(n=e[t].probability,a=e[t].className);setTimeout(()=>{evaluateGame(a)},500)}},a.readAsDataURL(t)}function evaluateGame(e){const t=document.getElementById("final-result");if(!e||"아무것도 내지않음"===e)return t.innerText="⚠️ 무엇을 냈는지 알 수 없습니다!",t.style.color="#fbbc05",document.getElementById("user-move").innerText="안 냄",toggleButtons(!1),void(isPlaying=!1);const n=["가위","바위","보"][Math.floor(3*Math.random())];document.getElementById("user-move").innerText=e,document.getElementById("computer-move").innerText=n;const a=getResult(e,n);"승리"===a?(currentStreak++,t.innerText="🎉 승리했습니다!",t.style.color="#34a853"):"패배"===a?(t.innerText="😢 패배했습니다...",t.style.color="#ea4335",checkHighScore(currentStreak),currentStreak=0):(t.innerText="🤝 무승부!",t.style.color="#fbbc05"),document.getElementById("current-streak").innerText=currentStreak,toggleButtons(!1),isPlaying=!1}function toggleButtons(e){const t=document.getElementById("play-btn");webcam&&(t.disabled=e),document.getElementById("btn-scissors").disabled=e,document.getElementById("btn-rock").disabled=e,document.getElementById("btn-paper").disabled=e;const n=document.getElementById("btn-upload");n.style.opacity=e?"0.5":"1",n.style.pointerEvents=e?"none":"auto"}function getResult(e,t){return e===t?"무승부":"가위"===e&&"보"===t||"바위"===e&&"가위"===t||"보"===e&&"바위"===t?"승리":"패배"}function checkHighScore(e){e>0&&e>maxStreak&&setTimeout(()=>{const t=prompt(`🎉 새로운 최고 기록(${e}연승)입니다!\n이름을 입력해주세요:`,"익명");null!==t&&""!==t.trim()&&(maxStreak=e,maxStreakName=t.trim(),localStorage.setItem("rspMaxStreak",maxStreak.toString()),localStorage.setItem("rspMaxName",maxStreakName),updateRecordUI())},100)}function updateRecordUI(){document.getElementById("best-record").innerText=`${maxStreakName} (${maxStreak}연승)`}updateRecordUI()</script></body></html>
